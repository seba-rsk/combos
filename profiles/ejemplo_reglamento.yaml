# Plantilla comentada para crear un reglamento nuevo

metadata:
  code_name: "EJEMPLO"
  code_version: "2026"
  country: "Argentina"
  description: "Reglamento de Ejemplo"

   
permanent_load_types:
    - D     # Tipos de carga que representan cargas permanentes gravitatorias (ej: peso propio, cargas muertas). Esta clave es obligatoria.
  
            # Validaciones de permanent_load_types
            # Existencia: Es una sección obligatoria del yaml. Si no existe, el software falla con error duro al cargar el reglamento.
            # No puede estar vacía: Debe contener al menos un tipo de carga. Declarar la clave sin valores produce error duro.
            # Sin duplicados: Si el mismo tipo aparece más de una vez en la lista, produce error duro.
            # Tipos válidos: Cada tipo declarado debe existir en load_types del mismo yaml. Si se referencia un tipo no definido, produce error duro.
            # Presencia en todas las combinaciones: Cada combinación declarada en combinations, sin excepción y sin importar el estado límite, debe contener al menos uno de los tipos permanentes declarados. Si alguna combinación no lo tiene, produce error duro.

          # Lo que no se valida (decisiones explícitas)
          # No se valida que todas las combinaciones usen todos los tipos permanentes, solo que usen al menos uno.
          # No se valida el factor con que aparece la carga permanente en cada combinación, eso es responsabilidad del reglamento.

          # Forma de declarar varios tipos de carga como cargas permanentes:
          # permanent_load_types:
          #   - D
          #   - F

# Parámetros del reglamento (sección opcional)
# Un parámetro es una propiedad del proyecto (ej: destino del edificio) que
# COMBOS pregunta una sola vez por corrida, después de leer los estados de
# carga y solo si algún estado usa los tipos que el parámetro afecta (si no
# aplica, se usa su valor por defecto sin preguntar). El valor elegido
# reemplaza cada referencia { param: <id> } en los factores de las
# combinaciones, y la elección queda registrada en el encabezado del Excel
# exportado. Ver profiles/cirsoc2005_actualizado.yaml para un caso real.
#
# parameters:
#   L_factor:                     # Id del parámetro (se usa en las referencias).
#     name: "Factor de sobrecarga L"   # Título que se muestra en pantalla.
#     options:                    # Al menos dos opciones.
#       - label: "Destinos con sobrecarga alta"   # Texto libre, a criterio del autor.
#         value: 1.0              # Número mayor que cero.
#       - label: "Resto de los destinos"
#         value: 0.5
#     default: 1.0                # Debe coincidir con el value de una opción.
#
# Y en la combinación que corresponda, en vez del número fijo:
#   factors:
#     D: 1.2
#     L: { param: L_factor }
#
# Validaciones de parameters
# Sección opcional: si no existe, el reglamento se comporta como siempre.
# Si existe, no puede estar vacía.
# Cada parámetro necesita name, options (mínimo dos, cada una con label y
#   value mayor que cero) y default (igual al value de alguna opción).
# Toda referencia { param: X } debe apuntar a un parámetro definido.
# Todo parámetro definido debe ser referenciado por al menos una
#   combinación; un parámetro sin uso produce error duro (típico typo).

# Estados límite
limit_states:
  ELU:    # Id del estado límite.
    name: "Estado límite último"
    prefix: "ULT"
    
  ELS:    # Id del estado límite.
    name: "Estado límite de servicio"
    prefix: "SERV"

# Definición de tipos de carga soportados
load_types:
  D:      # Id del tipo de carga.    
    name: "Cargas permanentes"
    description: "Cargas permanentes debidas al peso de los elementos estructurales y de los elementos que actúan en forma permanente sobre la estructura, o las solicitaciones correspondientes."

  L:      # Id del tipo de carga.
    name: "Cargas vivas"
    description: "Sobrecargas debida a la ocupación y a los equipos móviles, o las solicitaciones correspondientes."

  W:      # Id del tipo de carga.
    name: "Carga de viento"
    description: "Carga debida al viento, o las solicitaciones correspondientes."


# Combinaciones de carga
#
# Cada combinación admite un campo opcional name: la designación con la
# que el reglamento la identifica (ej. "U3.1"). Texto libre, a criterio
# del autor. COMBOS lo usa para hablarte en la nomenclatura de la norma
# (ej. la línea "Afecta a" al preguntar por un parámetro); sin name, la
# combinación se identifica por su id.
#
#   - id: 1
#     name: "U1.1"
#     factors:
#       D: 1.4
#
# Validaciones de id y name
# El id debe ser un número entero, único dentro de su estado límite
#   (puede repetirse entre estados límite distintos). Un id duplicado o
#   no entero produce error duro.
# El name, si existe, no puede estar vacío y debe ser único en todo el
#   reglamento, incluso entre estados límite distintos. Repetirlo
#   produce error duro.
combinations:
  ELU:
    - id: 1
      factors:
        D: 1.4

    - id: 2
      factors:
        D: 1.2
        L: 1.6

    - id: 3
      factors:
        D: 1.2
        W: 0.8

    - id: 4
      factors:
        D: 1.2
        W: 1.6
        L: 1.0

    - id: 5
      factors:
        D: 0.9
        W: 1.6

  ELS:
    - id: 1
      factors:
        D: 1.0

    - id: 2
      factors:
        D: 1.0
        L: 1.0

    - id: 3
      factors:
        D: 1.0
        W: 1.0

    - id: 4
      factors:
        D: 1.0
        L: 0.7
        W: 0.7

    - id: 5
      factors:
        D: 1.0
        L: 0.6
        W: 0.6