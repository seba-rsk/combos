# Plantilla comentada para crear un reglamento nuevo

metadata:
  code_name: "EJEMPLO"
  code_version: "2026"
  country: "Argentina"
  description: "Reglamento de Ejemplo"

   
permanent_load_types:
    - D     # Tipos de carga que representan cargas permanentes gravitatorias (ej: peso propio, cargas muertas). Esta clave es obligatoria.
  
            # Validaciones de permanent_load_types
            # Existencia: Es una sección obligatoria del yaml. Si no existe, el software falla con error duro al cargar el reglamento.
            # No puede estar vacía: Debe contener al menos un tipo de carga. Declarar la clave sin valores produce error duro.
            # Sin duplicados: Si el mismo tipo aparece más de una vez en la lista, produce error duro.
            # Tipos válidos: Cada tipo declarado debe existir en load_types del mismo yaml. Si se referencia un tipo no definido, produce error duro.
            # Presencia en todas las combinaciones: Cada combinación declarada en combinations, sin excepción y sin importar el estado límite, debe contener al menos uno de los tipos permanentes declarados. Si alguna combinación no lo tiene, produce error duro.

          # Lo que no se valida (decisiones explícitas)
          # No se valida que todas las combinaciones usen todos los tipos permanentes, solo que usen al menos uno.
          # No se valida el factor con que aparece la carga permanente en cada combinación, eso es responsabilidad del reglamento.

          # Forma de declarar varios tipos de carga como cargas permanentes:
          # permanent_load_types:
          #   - D
          #   - F

# Estados límite
limit_states:
  ELU:    # Id del estado límite.
    name: "Estado límite último"
    prefix: "ULT"
    
  ELS:    # Id del estado límite.
    name: "Estado límite de servicio"
    prefix: "SERV"

# Definición de tipos de carga soportados
load_types:
  D:      # Id del tipo de carga.    
    name: "Cargas permanentes"
    description: "Cargas permanentes debidas al peso de los elementos estructurales y de los elementos que actúan en forma permanente sobre la estructura, o las solicitaciones correspondientes."

  L:      # Id del tipo de carga.
    name: "Cargas vivas"
    description: "Sobrecargas debida a la ocupación y a los equipos móviles, o las solicitaciones correspondientes."

  W:      # Id del tipo de carga.
    name: "Carga de viento"
    description: "Carga debida al viento, o las solicitaciones correspondientes."


# Combinaciones de carga
combinations:
  ELU:
    - id: 1
      factors:
        D: 1.4

    - id: 2
      factors:
        D: 1.2
        L: 1.6

    - id: 3
      factors:
        D: 1.2
        W: 0.8

    - id: 4
      factors:
        D: 1.2
        W: 1.6
        L: 1.0

    - id: 5
      factors:
        D: 0.9
        W: 1.6

  ELS:
    - id: 1
      factors:
        D: 1.0

    - id: 2
      factors:
        D: 1.0
        L: 1.0

    - id: 3
      factors:
        D: 1.0
        W: 1.0

    - id: 4
      factors:
        D: 1.0
        L: 0.7
        W: 0.7

    - id: 5
      factors:
        D: 1.0
        L: 0.6
        W: 0.6