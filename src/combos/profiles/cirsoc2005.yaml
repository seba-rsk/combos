    - id: 8
      # U3.4 = 1.2D+1.6S+0.8W
      factors:
        D: 1.2
        S: 1.6
        W: 0.8

    - id: 9
      # U3.5 = 1.2D+1.6R+1.0L
      factors:
        D: 1.2
        R: 1.6
        L: 1.0

    - id: 10
      # U3.6 = 1.2D+1.6R+0.8W
      factors:
        D: 1.2
        R: 1.6
        W: 0.8

    - id: 11
      # U4.1 = 1.2D+1.6W+1.0L+0.5Lr
      factors:
        D: 1.2
        W: 1.6
        L: 1.0
        Lr: 0.5

    - id: 12
      # U4.2 = 1.2D+1.6W+1.0L+0.5S
