        R: 0.5

    - id: 14
      # U4.4 = 1.2D+1.0Wi+1.0Di+0.5S
      factors:
        D: 1.2
        Wi: 1.0
        Di: 1.0
        S: 0.5

    - id: 15
      # U5.1 = 1.2D+1.0E+1.0L+0.7S
