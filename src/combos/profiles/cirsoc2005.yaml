        H: 1.6

  ELS:
    - id: 1
      # S1.1 = D+F+T
      factors:
        D: 1.0
        F: 1.0
        T: 1.0

    - id: 2
      # S1.2 = D+F+L+Lr+S+R+H
      factors:
        D: 1.0
