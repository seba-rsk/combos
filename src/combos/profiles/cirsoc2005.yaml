        L: 1.0
        S: 0.7

    - id: 16
      # U5.2 = 1.2D+1.0E+1.0Lr+0.7S
      factors:
        D: 1.2
        E: 1.0
        Lr: 1.0
        S: 0.7

    - id: 17
      # U6.1 = 0.9D+1.6W+1.6H
      factors:
        D: 0.9
        W: 1.6
        H: 1.6

    - id: 18
      # U6.2 = 0.9D+1.6Wi+1.0Di+1.6H
      factors:
        D: 0.9
        Wi: 1.6
        Di: 1.0
        H: 1.6

    - id: 19
      # U7.1 = 0.9D+1.0E+1.6H
      factors:
