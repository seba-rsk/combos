# CIRSOC
# Tipos de carga + Combinaciones específicas para Argentina

metadata:
  code_name: "CIRSOC"
  code_version: "2005"
  country: "Argentina"
  description: "Reglamento Argentino de Cargas y Combinaciones"

permanent_load_types:
  - D

# Estados límite
limit_states:
  ELU:    # Id del estado límite.
    name: "Estado límite último"
    prefix: "U"
    
  ELS:    # Id del estado límite.
    name: "Estado límite de servicio"
    prefix: "S"

# Definición de tipos de carga soportados
load_types:
  D:      # Id del tipo de carga.    
    name: "Cargas permanentes"
    description: "Cargas permanentes debidas al peso de los elementos estructurales y de los elementos que actúan en forma permanente sobre la estructura, o las solicitaciones correspondientes."

  L:      # Id del tipo de carga.
    name: "Cargas vivas"
    description: "Sobrecargas debida a la ocupación y a los equipos móviles, o las solicitaciones correspondientes."

  Lr:      # Id del tipo de carga.
    name: "Sobrecarga de cubiertas"
    description: "Sobrecargas en las cubiertas, o las solicitaciones correspondientes."

  S:      # Id del tipo de carga.
    name: "Carga de nieve"
    description: "Carga debida a la nieve, o las solicitaciones correspondientes."

  Di:      # Id del tipo de carga.
    name: "Carga de hielo"
    description: "Carga debida al peso del hielo, o las solicitaciones correspondientes."

  W:      # Id del tipo de carga.
    name: "Carga de viento"
    description: "Carga debida al viento, o las solicitaciones correspondientes."

  Wi:      # Id del tipo de carga.
    name: "Carga de viento sobre el hielo"
    description: "Carga debida al viento actuando sobre el hielo, o las solicitaciones correspondientes."

  E:      # Id del tipo de carga.
    name: "Carga sísmica"
    description: "Efecto provocado por las componentes horizontal y vertical de la acción sísmica."

  T:      # Id del tipo de carga.
    name: "Efecto de temperatura"
    description: "Solicitaciones de coacción y efectos provenientes de la contracción o expansión resultante de las variaciones de temperatura, fluencia lenta de los materiales componentes, contracción, cambios de humedad y asentamientos diferenciales o sus combinaciones."

  F:      # Id del tipo de carga.
    name: "Cargas por fluidos"
    description: "Cargas debidas al peso y presión de fluidos con presiones bien definidas y alturas máximas controlables, o las solicitaciones correspondientes."

  H:      # Id del tipo de carga.
    name: "Cargas de suelos"
    description: "Cargas debidas al peso y presión lateral del suelo, del agua en el suelo u otros materiales, o las solicitaciones correspondientes."

  R:      # Id del tipo de carga.
    name: "Cargas por lluvia"
    description: "Carga debida a la lluvia, o las solicitaciones correspondientes."

# Combinaciones de carga
combinations:
  ELU:
    # U1.1 = 1.4(D+F)  
    - id: 1
      factors:
        D: 1.4
        F: 1.4

    - id: 2
      # U2.1 = 1.2(D+F+T)+1.6(L+H)+0.5Lr
      factors:
        D: 1.2
        F: 1.2
        T: 1.2
        L: 1.6
        H: 1.6
        Lr: 0.5

    - id: 3
      # U2.2 = 1.2(D+F+T)+1.6(L+H)+0.5S+0.2Di
      factors:
        D: 1.2
        F: 1.2
        T: 1.2
        L: 1.6
        H: 1.6
        S: 0.5
        Di: 0.2

    - id: 4
      # U2.3 = 1.2(D+F+T)+1.6(L+H)+0.5R
      factors:
        D: 1.2
